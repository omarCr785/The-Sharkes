<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>🦈 Sharks — نظام التقييم</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet" />
  <style>
    :root {
      --shark-dark:   #0d1b2a;
      --shark-blue:   #1a3a5c;
      --shark-accent: #00b4d8;
      --shark-gold:   #f4c430;
      --shark-light:  #e8f4f8;
      --text-main:    #1a1a2e;
      --text-muted:   #64748b;
      --white:        #ffffff;
      --radius:       12px;
      --shadow:       0 4px 24px rgba(0,0,0,0.10);

      /* team colors */
      --media:        #1F6B8E;
      --pr:           #7D3C98;
      --logistic:     #1E8449;
      --presentation: #B7770D;
      --sports:       #CB4335;
      --hrteam:       #2E4053;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Cairo', sans-serif;
      background: var(--shark-dark);
      color: var(--text-main);
      min-height: 100vh;
    }

    /* ── LOGIN ───────────────────────────────────────────── */
    #login-screen {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #0d1b2a 0%, #1a3a5c 60%, #0d1b2a 100%);
      position: relative;
      overflow: hidden;
    }
    #login-screen::before {
      content: '🦈';
      position: absolute;
      font-size: 300px;
      opacity: 0.04;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      pointer-events: none;
    }

    .login-card {
      background: rgba(255,255,255,0.05);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(0,180,216,0.2);
      border-radius: 20px;
      padding: 48px 40px;
      width: 380px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.4);
      position: relative;
      z-index: 1;
    }

    .login-logo {
      text-align: center;
      margin-bottom: 32px;
    }
    .login-logo .shark-icon { font-size: 52px; display: block; margin-bottom: 8px; }
    .login-logo h1 { color: var(--white); font-size: 22px; font-weight: 900; letter-spacing: 1px; }
    .login-logo p  { color: var(--shark-accent); font-size: 13px; margin-top: 4px; }

    .form-group { margin-bottom: 20px; }
    .form-group label {
      display: block;
      color: rgba(255,255,255,0.7);
      font-size: 13px;
      font-weight: 600;
      margin-bottom: 8px;
    }
    .form-group input {
      width: 100%;
      padding: 12px 16px;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: var(--radius);
      color: var(--white);
      font-family: 'Cairo', sans-serif;
      font-size: 15px;
      outline: none;
      transition: border-color 0.2s, background 0.2s;
    }
    .form-group input:focus {
      border-color: var(--shark-accent);
      background: rgba(0,180,216,0.08);
    }
    .form-group input::placeholder { color: rgba(255,255,255,0.3); }

    .btn-login {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, var(--shark-accent), #0077b6);
      border: none;
      border-radius: var(--radius);
      color: var(--white);
      font-family: 'Cairo', sans-serif;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.1s;
      margin-top: 8px;
    }
    .btn-login:hover  { opacity: 0.92; }
    .btn-login:active { transform: scale(0.98); }

    .login-error {
      background: rgba(203,67,53,0.15);
      border: 1px solid rgba(203,67,53,0.4);
      color: #ff8a80;
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 13px;
      margin-top: 14px;
      text-align: center;
      display: none;
    }

    /* ── APP SHELL ───────────────────────────────────────── */
    #app { display: none; min-height: 100vh; background: #f0f4f8; }

    /* TOP NAV */
    .topnav {
      background: var(--shark-dark);
      padding: 0 28px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 60px;
      border-bottom: 2px solid var(--shark-accent);
      position: sticky; top: 0; z-index: 100;
    }
    .topnav-brand { color: var(--white); font-weight: 900; font-size: 18px; display: flex; align-items: center; gap: 8px; }
    .topnav-brand span { color: var(--shark-accent); }
    .topnav-right { display: flex; align-items: center; gap: 16px; }
    .user-badge {
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 20px;
      padding: 6px 14px;
      color: var(--white);
      font-size: 13px;
      display: flex; align-items: center; gap: 6px;
    }
    .user-badge .role-dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: var(--shark-accent);
    }
    .btn-logout {
      background: rgba(203,67,53,0.15);
      border: 1px solid rgba(203,67,53,0.3);
      color: #ff8a80;
      border-radius: 8px;
      padding: 6px 14px;
      font-family: 'Cairo', sans-serif;
      font-size: 13px;
      cursor: pointer;
      transition: background 0.2s;
    }
    .btn-logout:hover { background: rgba(203,67,53,0.3); }

    /* MAIN LAYOUT */
    .main-content { padding: 28px; max-width: 1200px; margin: 0 auto; }

    /* PAGE HEADER */
    .page-header {
      background: linear-gradient(135deg, var(--shark-dark), var(--shark-blue));
      border-radius: 16px;
      padding: 28px 32px;
      margin-bottom: 24px;
      color: var(--white);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .page-header h2 { font-size: 22px; font-weight: 900; }
    .page-header p  { color: rgba(255,255,255,0.6); font-size: 13px; margin-top: 4px; }
    .team-badge {
      padding: 8px 20px;
      border-radius: 20px;
      font-weight: 700;
      font-size: 14px;
      color: var(--white);
    }

    /* STATS STRIP */
    .stats-strip {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
      gap: 16px;
      margin-bottom: 24px;
    }
    .stat-card {
      background: var(--white);
      border-radius: var(--radius);
      padding: 20px;
      box-shadow: var(--shadow);
      text-align: center;
      border-top: 4px solid var(--shark-accent);
    }
    .stat-card .stat-value { font-size: 28px; font-weight: 900; color: var(--shark-dark); }
    .stat-card .stat-label { font-size: 12px; color: var(--text-muted); margin-top: 4px; }

    /* TABLE CARD */
    .table-card {
      background: var(--white);
      border-radius: 16px;
      box-shadow: var(--shadow);
      overflow: hidden;
    }
    .table-card-header {
      padding: 20px 24px;
      border-bottom: 1px solid #e2e8f0;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .table-card-header h3 { font-size: 16px; font-weight: 700; color: var(--shark-dark); }

    .btn-add {
      background: var(--shark-accent);
      color: var(--white);
      border: none;
      border-radius: 8px;
      padding: 8px 18px;
      font-family: 'Cairo', sans-serif;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      display: flex; align-items: center; gap: 6px;
      transition: opacity 0.2s;
    }
    .btn-add:hover { opacity: 0.88; }

    table { width: 100%; border-collapse: collapse; font-size: 13px; }
    thead th {
      background: var(--shark-dark);
      color: var(--white);
      padding: 12px 14px;
      text-align: center;
      font-weight: 700;
      font-size: 12px;
      white-space: nowrap;
    }
    tbody tr { border-bottom: 1px solid #f1f5f9; transition: background 0.15s; }
    tbody tr:hover { background: #f8fafc; }
    tbody td {
      padding: 11px 14px;
      text-align: center;
      color: var(--text-main);
    }
    tbody td:first-child { text-align: right; font-weight: 600; }

    /* editable score input */
    .score-input {
      width: 58px;
      padding: 5px 8px;
      border: 1.5px solid #e2e8f0;
      border-radius: 6px;
      text-align: center;
      font-family: 'Cairo', sans-serif;
      font-size: 13px;
      color: var(--text-main);
      background: #f8fafc;
      transition: border-color 0.2s;
    }
    .score-input:focus { border-color: var(--shark-accent); outline: none; background: #fff; }
    .score-input:disabled { background: #f1f5f9; color: var(--text-muted); cursor: not-allowed; }

    .grade-badge {
      display: inline-block;
      padding: 3px 12px;
      border-radius: 12px;
      font-size: 11px;
      font-weight: 700;
    }
    .grade-excellent   { background: #c6efce; color: #1e7e34; }
    .grade-verygood    { background: #d6eaf8; color: #1a5276; }
    .grade-good        { background: #fef3cd; color: #856404; }
    .grade-pass        { background: #ffe7e7; color: #9c0006; }

    .rank-badge {
      display: inline-flex; align-items: center; justify-content: center;
      width: 26px; height: 26px;
      border-radius: 50%;
      font-size: 11px; font-weight: 900;
      background: #e2e8f0; color: #475569;
    }
    .rank-badge.top1 { background: var(--shark-gold); color: #7d4e00; }
    .rank-badge.top2 { background: #c0c0c0; color: #3d3d3d; }
    .rank-badge.top3 { background: #cd7f32; color: var(--white); }

    .btn-save-row {
      background: #e8f5e9;
      color: #1e7e34;
      border: 1px solid #a5d6a7;
      border-radius: 6px;
      padding: 5px 12px;
      font-family: 'Cairo', sans-serif;
      font-size: 12px;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.2s;
    }
    .btn-save-row:hover { background: #c8e6c9; }

    .btn-delete-row {
      background: #fde8e8;
      color: #c0392b;
      border: 1px solid #f5a9a9;
      border-radius: 6px;
      padding: 5px 10px;
      font-family: 'Cairo', sans-serif;
      font-size: 12px;
      cursor: pointer;
      transition: background 0.2s;
    }
    .btn-delete-row:hover { background: #f9c0c0; }

    /* NOTES textarea */
    .notes-input {
      width: 100%;
      min-width: 100px;
      padding: 5px 8px;
      border: 1.5px solid #e2e8f0;
      border-radius: 6px;
      font-family: 'Cairo', sans-serif;
      font-size: 12px;
      resize: none;
      background: #f8fafc;
    }
    .notes-input:focus { border-color: var(--shark-accent); outline: none; }

    /* DASHBOARD (HR) */
    .dashboard-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 20px;
      margin-bottom: 24px;
    }
    .team-summary-card {
      background: var(--white);
      border-radius: 16px;
      box-shadow: var(--shadow);
      overflow: hidden;
    }
    .team-summary-card .card-top {
      padding: 16px 20px;
      color: var(--white);
      display: flex; align-items: center; justify-content: space-between;
    }
    .team-summary-card .card-top h4 { font-size: 16px; font-weight: 900; }
    .team-summary-card .card-top .avg { font-size: 28px; font-weight: 900; }
    .team-summary-card .card-body { padding: 16px 20px; }
    .mini-bar { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; font-size: 12px; }
    .mini-bar-label { width: 75px; color: var(--text-muted); flex-shrink: 0; }
    .mini-bar-track { flex: 1; height: 8px; background: #e2e8f0; border-radius: 4px; overflow: hidden; }
    .mini-bar-fill  { height: 100%; border-radius: 4px; transition: width 0.5s ease; }
    .mini-bar-val   { width: 28px; text-align: left; font-weight: 700; color: var(--text-main); }

    /* HR full master table */
    .filter-row {
      display: flex; gap: 12px; align-items: center;
      padding: 16px 24px;
      border-bottom: 1px solid #e2e8f0;
      flex-wrap: wrap;
    }
    .filter-row select, .filter-row input {
      padding: 8px 12px;
      border: 1.5px solid #e2e8f0;
      border-radius: 8px;
      font-family: 'Cairo', sans-serif;
      font-size: 13px;
      color: var(--text-main);
      background: var(--white);
    }
    .filter-row select:focus, .filter-row input:focus { border-color: var(--shark-accent); outline: none; }

    /* HR Decision dropdown */
    .hr-decision-select {
      padding: 4px 8px;
      border: 1.5px solid #e2e8f0;
      border-radius: 6px;
      font-family: 'Cairo', sans-serif;
      font-size: 12px;
      background: #fffde7;
      color: var(--text-main);
      cursor: pointer;
    }

    /* TOAST */
    #toast {
      position: fixed;
      bottom: 24px; left: 50%; transform: translateX(-50%);
      background: #1e7e34;
      color: var(--white);
      padding: 12px 28px;
      border-radius: 24px;
      font-size: 14px;
      font-weight: 700;
      box-shadow: 0 8px 24px rgba(0,0,0,0.2);
      opacity: 0;
      transition: opacity 0.3s;
      z-index: 9999;
      pointer-events: none;
    }
    #toast.show { opacity: 1; }
    #toast.error { background: #c0392b; }

    /* MODAL */
    .modal-overlay {
      display: none;
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.5);
      z-index: 500;
      align-items: center; justify-content: center;
    }
    .modal-overlay.open { display: flex; }
    .modal-box {
      background: var(--white);
      border-radius: 16px;
      padding: 32px;
      width: 420px;
      max-width: 95vw;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    }
    .modal-box h3 { font-size: 18px; font-weight: 900; margin-bottom: 20px; color: var(--shark-dark); }
    .modal-box .form-group label { color: var(--text-muted); }
    .modal-box .form-group input {
      background: #f8fafc;
      border: 1.5px solid #e2e8f0;
      color: var(--text-main);
      border-radius: 8px;
    }
    .modal-box .form-group input:focus { border-color: var(--shark-accent); background: #fff; }
    .modal-actions { display: flex; gap: 12px; margin-top: 24px; }
    .btn-primary {
      flex: 1; padding: 12px;
      background: var(--shark-accent); color: var(--white);
      border: none; border-radius: 8px;
      font-family: 'Cairo', sans-serif; font-size: 14px; font-weight: 700;
      cursor: pointer;
    }
    .btn-secondary {
      flex: 1; padding: 12px;
      background: #f1f5f9; color: var(--text-muted);
      border: none; border-radius: 8px;
      font-family: 'Cairo', sans-serif; font-size: 14px;
      cursor: pointer;
    }

    /* Loading */
    .loading-overlay {
      position: fixed; inset: 0;
      background: rgba(13,27,42,0.85);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      z-index: 999;
      color: var(--white);
      font-size: 16px; gap: 16px;
    }
    .spinner {
      width: 44px; height: 44px;
      border: 4px solid rgba(255,255,255,0.1);
      border-top-color: var(--shark-accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .empty-state {
      text-align: center; padding: 48px 24px;
      color: var(--text-muted);
    }
    .empty-state .icon { font-size: 48px; margin-bottom: 12px; }
    .empty-state p { font-size: 14px; }

    @media (max-width: 768px) {
      .main-content { padding: 16px; }
      .page-header { flex-direction: column; gap: 12px; text-align: center; }
      .stats-strip { grid-template-columns: repeat(2, 1fr); }
      table { font-size: 12px; }
      .score-input { width: 48px; }
    }
  </style>
</head>
<body>

<!-- ══ LOGIN ══ -->
<div id="login-screen">
  <div class="login-card">
    <div class="login-logo">
      <span class="shark-icon">🦈</span>
      <h1>SHARKS</h1>
      <p>نظام تقييم الأداء</p>
    </div>
    <div class="form-group">
      <label>اسم المستخدم</label>
      <input type="text" id="username" placeholder="أدخل اسم المستخدم" autocomplete="off" />
    </div>
    <div class="form-group">
      <label>كلمة المرور</label>
      <input type="password" id="password" placeholder="أدخل كلمة المرور" />
    </div>
    <button class="btn-login" onclick="doLogin()">دخول</button>
    <div class="login-error" id="login-error">اسم المستخدم أو كلمة المرور غلط</div>
  </div>
</div>

<!-- ══ APP ══ -->
<div id="app">
  <!-- TOP NAV -->
  <nav class="topnav">
    <div class="topnav-brand">🦈 <span>SHARKS</span> Performance</div>
    <div class="topnav-right">
      <div class="user-badge">
        <span class="role-dot"></span>
        <span id="nav-user-label">—</span>
      </div>
      <button class="btn-logout" onclick="doLogout()">خروج</button>
    </div>
  </nav>

  <!-- MAIN -->
  <div class="main-content" id="main-content"></div>
</div>

<!-- ══ ADD MEMBER MODAL ══ -->
<div class="modal-overlay" id="add-modal">
  <div class="modal-box">
    <h3>➕ إضافة عضو جديد</h3>
    <div class="form-group">
      <label>الاسم</label>
      <input type="text" id="modal-name" placeholder="اسم العضو" />
    </div>
    <div class="form-group">
      <label>الكلية</label>
      <input type="text" id="modal-college" placeholder="اسم الكلية" />
    </div>
    <div class="modal-actions">
      <button class="btn-primary" onclick="confirmAddMember()">إضافة</button>
      <button class="btn-secondary" onclick="closeModal()">إلغاء</button>
    </div>
  </div>
</div>

<!-- ══ TOAST ══ -->
<div id="toast"></div>

<!-- ══ LOADING ══ -->
<div class="loading-overlay" id="loading" style="display:none">
  <div class="spinner"></div>
  <span id="loading-msg">جاري التحميل...</span>
</div>

<script>
// ════════════════════════════════════════════════════
//  CONFIG — عدّل القيم دي بس
// ════════════════════════════════════════════════════
const CONFIG = {
  // ← ضع هنا الـ URL بتاع Google Apps Script بعد النشر
  SCRIPT_URL: 'https://script.google.com/macros/s/AKfycbwPVntJSQBi4A2PKurcnqs4BB7rg8GKO3Ttioqu-085zuI_gaxeXBmxtlFNkj__UCcGSw/exec',

  USERS: {
    // username : { password, role, team }
    'hr_admin':        { password: 'sharks2025',  role: 'hr',   team: null,           label: 'HR Admin' },
    'head_media':      { password: 'media123',    role: 'head', team: 'Media',        label: 'Head Media' },
    'head_pr':         { password: 'pr123',       role: 'head', team: 'PR',           label: 'Head PR' },
    'head_logistic':   { password: 'log123',      role: 'head', team: 'Logistic',     label: 'Head Logistic' },
    'head_presentation':{ password: 'pres123',   role: 'head', team: 'Presentation', label: 'Head Presentation' },
    'head_sports':     { password: 'sports123',   role: 'head', team: 'Sports',       label: 'Head Sports' },
    'head_hrteam':     { password: 'hrteam123',  role: 'head', team: 'HR Team',      label: 'Head HR Team' },
  },

  TEAMS: ['Media','PR','Logistic','Presentation','Sports','HR Team'],

  TEAM_COLORS: {
    'Media':        '#1F6B8E',
    'PR':           '#7D3C98',
    'Logistic':     '#1E8449',
    'Presentation': '#B7770D',
    'Sports':       '#CB4335',
    'HR Team':      '#2E4053',
  },

  CRITERIA: [
    { key: 'commitment',   label: 'Commitment', max: 25 },
    { key: 'thinking',     label: 'Thinking',   max: 20 },
    { key: 'teamwork',     label: 'Teamwork',   max: 15 },
    { key: 'initiative',   label: 'Initiative', max: 10 },
    { key: 'team_score',   label: 'Team Score', max: 30 },
  ],

  HR_DECISIONS: ['—', 'مستمر ✅', 'تحت المراقبة ⚠️', 'إنذار 🔴', 'خروج ❌'],
};

// ════════════════════════════════════════════════════
//  STATE
// ════════════════════════════════════════════════════
let state = {
  user: null,
  data: {},   // { teamName: [ {id, name, college, commitment, thinking, teamwork, initiative, team_score, notes, hr_decision} ] }
  loading: false,
};

// ════════════════════════════════════════════════════
//  GOOGLE SHEETS API
// ════════════════════════════════════════════════════
function apiCall(action, payload = {}) {
  return new Promise((resolve, reject) => {
    showLoading('جاري المزامنة...');

    // flatten params
    const params = new URLSearchParams({ action });
    for (const [k, v] of Object.entries(payload)) {
      if (typeof v === 'object' && v !== null) {
        for (const [mk, mv] of Object.entries(v)) {
          params.append(mk, mv ?? '');
        }
      } else {
        params.append(k, v ?? '');
      }
    }

    // unique callback name
    const cbName = '_sharks_cb_' + Date.now();
    params.append('callback', cbName);

    const script = document.createElement('script');
    script.src   = CONFIG.SCRIPT_URL + '?' + params.toString();

    const cleanup = () => {
      hideLoading();
      delete window[cbName];
      if (script.parentNode) script.parentNode.removeChild(script);
    };

    window[cbName] = (json) => {
      cleanup();
      if (json.success) resolve(json.data);
      else {
        showToast('❌ ' + (json.error || 'خطأ'), true);
        reject(new Error(json.error));
      }
    };

    script.onerror = () => {
      cleanup();
      showToast('❌ فشل الاتصال بالسيرفر', true);
      reject(new Error('Script load error'));
    };

    document.head.appendChild(script);
  });
}

async function loadAllData() {
  try {
    const data = await apiCall('getData');
    state.data = data;
  } catch(e) {
    // use local state if offline
  }
}

async function saveRow(team, member) {
  await apiCall('saveRow', { team, member });
  showToast('✅ تم الحفظ بنجاح');
}

async function addMember(team, name, college) {
  const member = await apiCall('addMember', { team, name, college });
  if (!state.data[team]) state.data[team] = [];
  state.data[team].push(member);
  return member;
}

async function deleteMember(team, id) {
  await apiCall('deleteMember', { team, id });
  state.data[team] = state.data[team].filter(m => m.id !== id);
  showToast('🗑️ تم الحذف');
}

// ════════════════════════════════════════════════════
//  CALC HELPERS
// ════════════════════════════════════════════════════
function calcFixed(m) {
  const vals = [m.commitment, m.thinking, m.teamwork, m.initiative].map(v => parseFloat(v) || 0);
  return vals.reduce((a, b) => a + b, 0);
}
function calcFinal(m) {
  return calcFixed(m) + (parseFloat(m.team_score) || 0);
}
function calcGrade(score) {
  if (score >= 85) return { label: 'Excellent ✓',  cls: 'grade-excellent' };
  if (score >= 75) return { label: 'Very Good',     cls: 'grade-verygood'  };
  if (score >= 65) return { label: 'Good',          cls: 'grade-good'      };
  return              { label: 'Pass',           cls: 'grade-pass'      };
}
function calcRanks(members) {
  const scored = members
    .map((m, i) => ({ i, score: m.name ? calcFinal(m) : -1 }))
    .filter(x => x.score >= 0)
    .sort((a, b) => b.score - a.score);
  const ranks = {};
  scored.forEach((x, pos) => { ranks[x.i] = pos + 1; });
  return ranks;
}
function teamAvg(members) {
  const active = members.filter(m => m.name);
  if (!active.length) return 0;
  return active.reduce((s, m) => s + calcFinal(m), 0) / active.length;
}

// ════════════════════════════════════════════════════
//  LOGIN
// ════════════════════════════════════════════════════
function doLogin() {
  const u = document.getElementById('username').value.trim().toLowerCase();
  const p = document.getElementById('password').value;
  const err = document.getElementById('login-error');
  const user = CONFIG.USERS[u];
  if (!user || user.password !== p) {
    err.style.display = 'block';
    return;
  }
  err.style.display = 'none';
  state.user = { username: u, ...user };
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('app').style.display = 'block';
  document.getElementById('nav-user-label').textContent = user.label;
  initApp();
}

document.addEventListener('keydown', e => {
  if (e.key === 'Enter' && document.getElementById('login-screen').style.display !== 'none') doLogin();
});

function doLogout() {
  state.user = null;
  state.data = {};
  document.getElementById('login-screen').style.display = 'flex';
  document.getElementById('app').style.display = 'none';
  document.getElementById('username').value = '';
  document.getElementById('password').value = '';
}

// ════════════════════════════════════════════════════
//  INIT
// ════════════════════════════════════════════════════
async function initApp() {
  await loadAllData();
  if (state.user.role === 'hr') renderHRDashboard();
  else renderTeamView(state.user.team);
}

// ════════════════════════════════════════════════════
//  TEAM HEAD VIEW
// ════════════════════════════════════════════════════
function renderTeamView(team) {
  const members = state.data[team] || [];
  const ranks   = calcRanks(members);
  const color   = CONFIG.TEAM_COLORS[team];
  const avg     = teamAvg(members);
  const active  = members.filter(m => m.name);

  const gradeCount = { 'Excellent ✓': 0, 'Very Good': 0, 'Good': 0, 'Pass': 0 };
  active.forEach(m => { const g = calcGrade(calcFinal(m)); gradeCount[g.label]++; });

  document.getElementById('main-content').innerHTML = `
    <div class="page-header">
      <div>
        <h2>📋 تقييم تيم ${team}</h2>
        <p>أدخل درجات الأعضاء — البيانات بتتحفظ تلقائياً</p>
      </div>
      <span class="team-badge" style="background:${color}">${team}</span>
    </div>

    <div class="stats-strip">
      <div class="stat-card">
        <div class="stat-value">${active.length}</div>
        <div class="stat-label">عدد الأعضاء</div>
      </div>
      <div class="stat-card" style="border-top-color:${color}">
        <div class="stat-value">${avg.toFixed(1)}</div>
        <div class="stat-label">متوسط Final Score</div>
      </div>
      <div class="stat-card" style="border-top-color:#1e7e34">
        <div class="stat-value">${gradeCount['Excellent ✓']}</div>
        <div class="stat-label">Excellent</div>
      </div>
      <div class="stat-card" style="border-top-color:#856404">
        <div class="stat-value">${gradeCount['Pass']}</div>
        <div class="stat-label">Pass</div>
      </div>
    </div>

    <div class="table-card">
      <div class="table-card-header">
        <h3>أعضاء التيم</h3>
        <button class="btn-add" onclick="openAddModal('${team}')">+ إضافة عضو</button>
      </div>
      <div style="overflow-x:auto">
        <table id="team-table">
          <thead>
            <tr>
              <th>#</th>
              <th>الاسم</th>
              <th>الكلية</th>
              <th>Commitment<br>/25</th>
              <th>Thinking<br>/20</th>
              <th>Teamwork<br>/15</th>
              <th>Initiative<br>/10</th>
              <th>Team Score<br>/30</th>
              <th>Fixed<br>/70</th>
              <th>Final<br>/100</th>
              <th>Grade</th>
              <th>Rank</th>
              <th>ملاحظات</th>
              <th>حفظ</th>
              <th>حذف</th>
            </tr>
          </thead>
          <tbody id="team-tbody">
            ${members.length === 0
              ? `<tr><td colspan="15"><div class="empty-state"><div class="icon">👥</div><p>لا يوجد أعضاء — اضغط "+ إضافة عضو"</p></div></td></tr>`
              : members.map((m, i) => renderMemberRow(m, i, ranks[i], team)).join('')}
          </tbody>
        </table>
      </div>
    </div>
  `;
}

function renderMemberRow(m, i, rank, team) {
  if (!m.name) return '';
  const fixed  = calcFixed(m);
  const final  = calcFinal(m);
  const grade  = calcGrade(final);
  const rkCls  = rank === 1 ? 'top1' : rank === 2 ? 'top2' : rank === 3 ? 'top3' : '';

  const scoreInputs = CONFIG.CRITERIA.map(c => `
    <td>
      <input class="score-input" type="number" min="0" max="${c.max}"
        value="${m[c.key] ?? ''}"
        placeholder="0"
        onchange="updateLocal('${team}','${m.id}','${c.key}',this.value)"
        title="الحد الأقصى: ${c.max}"
      />
    </td>
  `).join('');

  return `
    <tr id="row-${m.id}">
      <td style="color:#94a3b8;font-size:11px">${i+1}</td>
      <td style="text-align:right">${m.name}</td>
      <td>${m.college || '—'}</td>
      ${scoreInputs}
      <td><strong style="color:#1e7e34">${fixed}</strong></td>
      <td><strong style="color:#1a5276">${final}</strong></td>
      <td><span class="grade-badge ${grade.cls}">${grade.label}</span></td>
      <td><span class="rank-badge ${rkCls}">${rank ?? '—'}</span></td>
      <td>
        <textarea class="notes-input" rows="1"
          onchange="updateLocal('${team}','${m.id}','notes',this.value)"
        >${m.notes || ''}</textarea>
      </td>
      <td><button class="btn-save-row" onclick="saveRowById('${team}','${m.id}')">💾 حفظ</button></td>
      <td><button class="btn-delete-row" onclick="confirmDelete('${team}','${m.id}','${m.name}')">🗑️</button></td>
    </tr>
  `;
}

function updateLocal(team, id, key, value) {
  const member = state.data[team]?.find(m => m.id === id);
  if (member) member[key] = parseFloat(value) || (key === 'notes' ? value : 0);
  // refresh row visuals only
  refreshRow(team, id);
}

function refreshRow(team, id) {
  const members = state.data[team] || [];
  const idx     = members.findIndex(m => m.id === id);
  const m       = members[idx];
  if (!m) return;
  const ranks = calcRanks(members);
  const rank  = ranks[idx];
  const fixed = calcFixed(m);
  const final = calcFinal(m);
  const grade = calcGrade(final);
  const rkCls = rank === 1 ? 'top1' : rank === 2 ? 'top2' : rank === 3 ? 'top3' : '';

  const row = document.getElementById(`row-${id}`);
  if (!row) return;
  const cells = row.querySelectorAll('td');
  // fixed=col 8 (index 7+criteria), final=8, grade=9, rank=10
  // cols: 0=#, 1=name, 2=college, 3-7=criteria, 8=fixed, 9=final, 10=grade, 11=rank
  cells[8].innerHTML  = `<strong style="color:#1e7e34">${fixed}</strong>`;
  cells[9].innerHTML  = `<strong style="color:#1a5276">${final}</strong>`;
  cells[10].innerHTML = `<span class="grade-badge ${grade.cls}">${grade.label}</span>`;
  cells[11].innerHTML = `<span class="rank-badge ${rkCls}">${rank ?? '—'}</span>`;

  // refresh all ranks in view
  members.forEach((mem, i) => {
    const r2  = document.getElementById(`row-${mem.id}`);
    if (!r2) return;
    const rk  = ranks[i];
    const rc  = rk === 1 ? 'top1' : rk === 2 ? 'top2' : rk === 3 ? 'top3' : '';
    r2.querySelectorAll('td')[11].innerHTML = `<span class="rank-badge ${rc}">${rk ?? '—'}</span>`;
  });
}

async function saveRowById(team, id) {
  const member = state.data[team]?.find(m => m.id === id);
  if (!member) return;
  await saveRow(team, member);
  renderTeamView(team);
}

function confirmDelete(team, id, name) {
  if (!confirm(`هل تريد حذف "${name}"؟`)) return;
  deleteMember(team, id).then(() => renderTeamView(team));
}

// ════════════════════════════════════════════════════
//  ADD MEMBER MODAL
// ════════════════════════════════════════════════════
let _addTeam = null;
function openAddModal(team) {
  _addTeam = team;
  document.getElementById('modal-name').value    = '';
  document.getElementById('modal-college').value = '';
  document.getElementById('add-modal').classList.add('open');
  setTimeout(() => document.getElementById('modal-name').focus(), 100);
}
function closeModal() { document.getElementById('add-modal').classList.remove('open'); }
async function confirmAddMember() {
  const name    = document.getElementById('modal-name').value.trim();
  const college = document.getElementById('modal-college').value.trim();
  if (!name) { showToast('❌ اكتب اسم العضو', true); return; }
  closeModal();
  await addMember(_addTeam, name, college);
  renderTeamView(_addTeam);
}

// ════════════════════════════════════════════════════
//  HR DASHBOARD
// ════════════════════════════════════════════════════
function renderHRDashboard() {
  const teams      = CONFIG.TEAMS;
  const teamColors = CONFIG.TEAM_COLORS;

  const summaryCards = teams.map(team => {
    const members = state.data[team] || [];
    const active  = members.filter(m => m.name);
    const avg     = active.length ? teamAvg(members) : 0;
    const color   = teamColors[team];
    const grades  = { 'Excellent ✓': 0, 'Very Good': 0, 'Good': 0, 'Pass': 0 };
    active.forEach(m => { const g = calcGrade(calcFinal(m)); grades[g.label]++; });
    const bars = [
      { label: 'Excellent', val: grades['Excellent ✓'], color: '#1e7e34', max: active.length || 1 },
      { label: 'Very Good', val: grades['Very Good'],   color: '#1a5276', max: active.length || 1 },
      { label: 'Good',      val: grades['Good'],        color: '#856404', max: active.length || 1 },
      { label: 'Pass',      val: grades['Pass'],        color: '#9c0006', max: active.length || 1 },
    ];
    return `
      <div class="team-summary-card">
        <div class="card-top" style="background:${color}">
          <div>
            <h4>${team}</h4>
            <div style="font-size:12px;opacity:0.8">${active.length} عضو</div>
          </div>
          <div class="avg">${avg.toFixed(1)}</div>
        </div>
        <div class="card-body">
          ${bars.map(b => `
            <div class="mini-bar">
              <div class="mini-bar-label">${b.label}</div>
              <div class="mini-bar-track">
                <div class="mini-bar-fill" style="width:${(b.val/b.max*100)}%;background:${b.color}"></div>
              </div>
              <div class="mini-bar-val">${b.val}</div>
            </div>
          `).join('')}
        </div>
      </div>
    `;
  }).join('');

  // Build master table
  const allRows = [];
  teams.forEach(team => {
    const members = state.data[team] || [];
    const ranks   = calcRanks(members);
    members.forEach((m, i) => {
      if (!m.name) return;
      allRows.push({ ...m, team, rank: ranks[i] });
    });
  });

  document.getElementById('main-content').innerHTML = `
    <div class="page-header">
      <div>
        <h2>🦈 HR Dashboard</h2>
        <p>نظرة شاملة على أداء كل التيمات</p>
      </div>
      <span class="team-badge" style="background:#1C2833">HR Admin</span>
    </div>

    <div class="dashboard-grid">${summaryCards}</div>

    <div class="table-card">
      <div class="table-card-header">
        <h3>📋 Master Sheet — كل الأعضاء</h3>
        <button class="btn-add" onclick="exportCSV()">⬇️ تصدير CSV</button>
      </div>
      <div class="filter-row">
        <select id="filter-team" onchange="applyFilters()">
          <option value="">كل التيمات</option>
          ${teams.map(t => `<option>${t}</option>`).join('')}
        </select>
        <select id="filter-grade" onchange="applyFilters()">
          <option value="">كل الدرجات</option>
          <option>Excellent ✓</option>
          <option>Very Good</option>
          <option>Good</option>
          <option>Pass</option>
        </select>
        <input type="text" id="filter-search" placeholder="🔍 بحث بالاسم..." oninput="applyFilters()" />
      </div>
      <div style="overflow-x:auto">
        <table>
          <thead>
            <tr>
              <th>#</th>
              <th>الاسم</th>
              <th>الكلية</th>
              <th>التيم</th>
              <th>Commit</th><th>Think</th><th>Team</th><th>Init</th>
              <th>T.Score</th>
              <th>Fixed/70</th>
              <th>Final/100</th>
              <th>Grade</th>
              <th>Rank</th>
              <th>HR Decision</th>
              <th>ملاحظات</th>
            </tr>
          </thead>
          <tbody id="master-tbody">
            ${renderMasterRows(allRows)}
          </tbody>
        </table>
      </div>
    </div>
  `;

  window._allMasterRows = allRows;
}

function renderMasterRows(rows) {
  if (!rows.length) return `<tr><td colspan="15"><div class="empty-state"><div class="icon">📭</div><p>لا توجد بيانات</p></div></td></tr>`;
  return rows.map((m, i) => {
    const fixed  = calcFixed(m);
    const final  = calcFinal(m);
    const grade  = calcGrade(final);
    const rkCls  = m.rank === 1 ? 'top1' : m.rank === 2 ? 'top2' : m.rank === 3 ? 'top3' : '';
    const color  = CONFIG.TEAM_COLORS[m.team];
    const decOpts = CONFIG.HR_DECISIONS.map(d =>
      `<option ${m.hr_decision === d ? 'selected' : ''}>${d}</option>`
    ).join('');
    return `
      <tr>
        <td style="color:#94a3b8;font-size:11px">${i+1}</td>
        <td style="text-align:right;font-weight:600">${m.name}</td>
        <td>${m.college || '—'}</td>
        <td><span class="team-badge" style="background:${color};padding:3px 10px;font-size:11px">${m.team}</span></td>
        <td>${m.commitment ?? 0}</td>
        <td>${m.thinking ?? 0}</td>
        <td>${m.teamwork ?? 0}</td>
        <td>${m.initiative ?? 0}</td>
        <td>${m.team_score ?? 0}</td>
        <td><strong style="color:#1e7e34">${fixed}</strong></td>
        <td><strong style="color:#1a5276">${final}</strong></td>
        <td><span class="grade-badge ${grade.cls}">${grade.label}</span></td>
        <td><span class="rank-badge ${rkCls}">${m.rank ?? '—'}</span></td>
        <td>
          <select class="hr-decision-select"
            onchange="saveHRDecision('${m.team}','${m.id}',this.value)">
            ${decOpts}
          </select>
        </td>
        <td style="font-size:12px;color:#64748b;max-width:120px">${m.notes || '—'}</td>
      </tr>
    `;
  }).join('');
}

function applyFilters() {
  const teamF   = document.getElementById('filter-team').value;
  const gradeF  = document.getElementById('filter-grade').value;
  const searchF = document.getElementById('filter-search').value.toLowerCase();
  const rows    = (window._allMasterRows || []).filter(m => {
    if (teamF  && m.team !== teamF) return false;
    if (gradeF && calcGrade(calcFinal(m)).label !== gradeF) return false;
    if (searchF && !m.name.toLowerCase().includes(searchF)) return false;
    return true;
  });
  document.getElementById('master-tbody').innerHTML = renderMasterRows(rows);
}

async function saveHRDecision(team, id, decision) {
  const member = state.data[team]?.find(m => m.id === id);
  if (member) {
    member.hr_decision = decision;
    await saveRow(team, member);
  }
}

function exportCSV() {
  const rows = window._allMasterRows || [];
  const header = ['الاسم','الكلية','التيم','Commitment','Thinking','Teamwork','Initiative','Team Score','Fixed','Final Score','Grade','Rank','HR Decision','ملاحظات'];
  const csvRows = [header.join(',')];
  rows.forEach(m => {
    const final = calcFinal(m);
    const grade = calcGrade(final).label;
    csvRows.push([
      m.name, m.college, m.team,
      m.commitment, m.thinking, m.teamwork, m.initiative, m.team_score,
      calcFixed(m), final, grade, m.rank,
      m.hr_decision || '', m.notes || ''
    ].map(v => `"${v ?? ''}"`).join(','));
  });
  const blob = new Blob(['\uFEFF' + csvRows.join('\n')], { type: 'text/csv;charset=utf-8' });
  const a    = document.createElement('a');
  a.href     = URL.createObjectURL(blob);
  a.download = `Sharks_Performance_${new Date().toISOString().slice(0,10)}.csv`;
  a.click();
}

// ════════════════════════════════════════════════════
//  UI HELPERS
// ════════════════════════════════════════════════════
function showLoading(msg = 'جاري التحميل...') {
  document.getElementById('loading-msg').textContent = msg;
  document.getElementById('loading').style.display = 'flex';
}
function hideLoading() { document.getElementById('loading').style.display = 'none'; }

function showToast(msg, isError = false) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className   = 'show' + (isError ? ' error' : '');
  clearTimeout(t._timeout);
  t._timeout = setTimeout(() => { t.className = ''; }, 3000);
}
